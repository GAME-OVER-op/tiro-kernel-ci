name: Build tiro KERNEL (NX769J) - standalone Kleaf

# Standalone QCOM Kleaf/Bazel kernel build for Nubia/RedMagic tiro (NX769J, SM8650 / pineapple).
# Base GKI = pristine AOSP kernel/common android14-6.1 (the SAME GKI branch the device's stock /
# LineageOS 23.2 ROM tracks, ASB-2026-06-01), NOT the OnePlus common fork. The OnePlus
# kernel_manifest is used ONLY to bootstrap the QCOM Kleaf infra (build/ + prebuilts/ + external/);
# `common` is then replaced with the AOSP GKI and overlaid with the nubia msm-kernel + device-trees.
# Rationale: a standard android14-6.1 GKI Image is KMI-compatible with the device's stock vendor
# modules (the GKI promise), so NO ABI-breaking symbol drops / module trims / custom LOCALVERSION are
# needed -- those were OnePlus-base-only hacks and are what broke /data. Produces boot.img +
# vendor_boot.img. TEST WITH `fastboot boot boot.img` (RAM), NEVER `fastboot flash boot`.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      # kernel "author" -> shows as (kurumi@dev) in /proc/version
      KBUILD_BUILD_USER: kurumi
      KBUILD_BUILD_HOST: dev
      # --- QCOM Kleaf infra bootstrap ONLY (build/ + prebuilts/ + external/; its `common`
      #     fork is discarded and replaced with pristine AOSP GKI below) ---
      MANIFEST_URL: https://github.com/OnePlusOSS/kernel_manifest.git
      MANIFEST_BRANCH: oneplus/sm8650
      MANIFEST_FILE: oneplus_12_b.xml
      # --- pristine AOSP GKI common (matches the device's stock/LineageOS android14-6.1 LTS) ---
      GKI_COMMON_REPO: https://android.googlesource.com/kernel/common
      GKI_COMMON_BRANCH: android14-6.1
      # --- nubia overlay sources ---
      NUBIA_KERNEL_REPO: https://github.com/nubia-sm8650-devs/android_kernel_nubia_sm8650.git
      NUBIA_DTS_REPO: https://github.com/nubia-sm8650-devs/android_kernel_nubia_sm8650-devicetrees.git
      NUBIA_BRANCH: lineage-23.2
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Maximize build disk space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 8192
          # 16 GB swap: the vmlinux LTO link + parallel image/module actions peak
          # well above the 16 GB runner RAM; without headroom the runner is OOM-killed
          # ("hosted runner lost communication"). Swap lives on the freed build volume.
          swap-size-mb: 16384
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          build-mount-path: /mnt/src

      - name: Give runner user ownership of the build mount
        run: sudo chown -R "$USER":"$USER" /mnt/src

      - name: Show free space + swap (before sync)
        run: |
          df -h /mnt/src /
          echo '--- memory / swap ---'
          free -h
          swapon --show || true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bc bison build-essential ccache curl flex git git-lfs gnupg gperf \
            libelf-dev liblz4-tool libssl-dev libxml2-utils lzop rsync zip \
            zlib1g-dev python3 python-is-python3

      - name: Install the 'repo' tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config --global user.name  "tiro-ci"
          git config --global user.email "tiro-ci@users.noreply.github.com"
          git config --global color.ui false
          git config --global advice.detachedHead false

      - name: Configure ccache
        run: |
          echo "USE_CCACHE=1"                 >> "$GITHUB_ENV"
          echo "CCACHE_EXEC=/usr/bin/ccache"  >> "$GITHUB_ENV"
          echo "CCACHE_DIR=/mnt/src/.ccache"  >> "$GITHUB_ENV"
          /usr/bin/ccache -M 15G || true

      - name: repo init - OnePlus SM8650 kernel_manifest
        working-directory: /mnt/src
        run: |
          mkdir -p kp && cd kp
          repo init --depth=1 --no-clone-bundle \
            -u "$MANIFEST_URL" -b "$MANIFEST_BRANCH" -m "$MANIFEST_FILE"

      - name: repo sync
        working-directory: /mnt/src/kp
        run: |
          # CodeLinaro (git.codelinaro.org = the 'clo-la' remote hosting the QCOM
          # prebuilts: clang / gcc / bazel / build-tools / jdk / stardoc) intermittently
          # returns "remote: The git server, Gitaly, is not available at this time" and
          # aborts the whole sync. Retry the sync a few times and let repo retry
          # individual fetches so a transient server-side blip does not fail the job.
          n=0; max=6
          until repo sync -c -j"$(nproc --all)" --retry-fetches=3 \
            --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then
              echo "ERROR: repo sync still failing after $max attempts - likely a CodeLinaro/Gitaly outage; re-run the workflow later."
              exit 1
            fi
            echo "repo sync attempt $n/$max failed (transient CodeLinaro/Gitaly outage?) - retrying in 60s..."
            sleep 60
          done
          echo 'space after sync:'; df -h /mnt/src
          echo 'top-level layout:'; ls -la

      - name: Overlay nubia msm-kernel + device-trees
        working-directory: /mnt/src/kp/kernel_platform
        run: |
          set -e
          echo '--- replacing the OnePlus common fork with pristine AOSP GKI (android14-6.1) ---'
          echo '--- this is the SAME GKI branch the device stock/LineageOS ROM tracks, so the ---'
          echo '--- resulting GKI Image is KMI-compatible with the on-device stock vendor modules ---'
          rm -rf common
          git clone --depth=1 -b "$GKI_COMMON_BRANCH" "$GKI_COMMON_REPO" common
          echo '--- replacing base msm-kernel with nubia fork ---'
          rm -rf msm-kernel
          git clone --depth=1 -b "$NUBIA_BRANCH" "$NUBIA_KERNEL_REPO" msm-kernel
          echo '--- placing nubia device-trees at the symlink target (sibling) ---'
          rm -rf sm8650-devicetrees
          git clone --depth=1 -b "$NUBIA_BRANCH" "$NUBIA_DTS_REPO" sm8650-devicetrees
          echo '--- FIX: device-trees kernel_dtstree glob omits subdir Kbuild (audio/tiro/...) ---'
          echo '--- add qcom/**/Kbuild so make dtbs can descend into subdirs inside the Bazel sandbox ---'
          sed -i 's#"qcom/Makefile",#"qcom/Makefile",\n            "qcom/**/Kbuild",\n            "qcom/**/Makefile",#' sm8650-devicetrees/BUILD.bazel
          grep -n Kbuild sm8650-devicetrees/BUILD.bazel || { echo 'ERROR: dtstree glob patch failed'; exit 1; }
          echo '--- FIX: generic techpack DTBOs (audio/camera/...) need sm8650-modules headers absent from the Kleaf sandbox ---'
          echo '--- trim device-trees to the tiro set: base pineapple dtb + mtp + tiro overlay (what dist consumes) ---'
          python3 "$GITHUB_WORKSPACE/scripts/tiro_dtb_trim.py" sm8650-devicetrees
          grep -nE '^subdir-y' sm8650-devicetrees/qcom/Makefile
          grep -n 'zte-tiro-overlay.dtbo' sm8650-devicetrees/qcom/platform_map.bzl || { echo 'ERROR: platform_map trim failed'; exit 1; }
          echo '--- (KMI symbol drop REMOVED: the AOSP GKI common exports the standard android14-6.1 ---'
          echo '---  KMI that the nubia msm-kernel QCOM symbol list is built against -> ABI parity) ---'
          echo '--- FIX: nubia config builds drivers/leds/aw22xxx/zte_led.ko but pineapple.bzl module_outs omits it ---'
          echo '--- declare it so Kleaf does not abort with "kernel modules are built but not copied" ---'
          python3 "$GITHUB_WORKSPACE/scripts/tiro_module_outs_fix.py" msm-kernel
          grep -q 'drivers/leds/aw22xxx/zte_led.ko' msm-kernel/pineapple.bzl || { echo 'ERROR: module_outs fix failed'; exit 1; }
          echo '--- NOTE: the nubia OEM defconfig fragments (oem/pineapple_diff.config + ---'
          echo '--- oem/boards/tiro_diff.config) are DELIBERATELY NOT applied here. They target the ---'
          echo '--- full vendor pineapple build (perf/consolidate) where vendor drivers are =y; the ---'
          echo '--- bare gki target forces them to =m and check_merged_defconfig then aborts ---'
          echo '--- (NFC_ST54J y->m). Those peripheral drivers already ship as stock vendor_dlkm .ko. ---'
          echo '--- (GKI module trim REMOVED: with the AOSP GKI base, cdc-acm/usbserial/rfcomm find ---'
          echo '---  __tty_port_tty_hangup normally, so the stock module manifests build unchanged) ---'
          echo '--- verifying the device-tree symlink resolves ---'
          ls -la msm-kernel/arch/arm64/boot/dts/vendor
          test -e msm-kernel/arch/arm64/boot/dts/vendor

      - name: Sanity-check kleaf compatibility (super_image)
        working-directory: /mnt/src/kp/kernel_platform
        run: |
          KB=build/kernel/kleaf/kernel.bzl
          if grep -q 'super_image' "$KB"; then
            echo "OK: base kleaf exports super_image - compatible with nubia msm-kernel."
          else
            echo "ERROR: base kleaf lacks super_image (wrong manifest base)."; exit 1
          fi

      - name: Apply tiro kernel customizations (power-saving + kernel name)
        working-directory: /mnt/src/kp/kernel_platform
        run: |
          set -e
          DEF=msm-kernel/arch/arm64/configs/gki_defconfig
          FRAG=msm-kernel/arch/arm64/configs/vendor/pineapple_GKI.config
          [ -f "$DEF" ]  || { echo "missing $DEF";  exit 1; }
          [ -f "$FRAG" ] || { echo "missing $FRAG"; exit 1; }

          # ===================================================================
          # BOOT-CRITICAL FIX: the flashed boot.img Image (uname
          # 6.1.x-android14-11) is built from common/ (pristine AOSP GKI), NOT
          # from msm-kernel/. So MODULE_SIG_PROTECT must be disabled in COMMONs
          # gki_defconfig, else the kernel rejects the stock /system_dlkm GKI
          # modules ("<mod>: exports protected symbol ... Permission denied":
          # rfkill/bt/net). That cascades rfkill->btpower->bt_fm_slim and leaves
          # the ASoC card soc:spf_core_platform:sound stuck in -EPROBE_DEFER ->
          # no ALSA card -> audioserver crash loop -> boot animation hangs.
          # ===================================================================
          CDEF=common/arch/arm64/configs/gki_defconfig
          [ -f "$CDEF" ] || { echo "missing $CDEF"; exit 1; }
          # DELETE the line (do NOT write "# ... is not set"): GKI check_defconfig runs
          # `make savedefconfig` and requires an EXACT match. savedefconfig omits
          # default-n symbols, so an explicit "# CONFIG_MODULE_SIG_PROTECT is not set"
          # fails the gate ("savedefconfig does not match"). MODULE_SIG_PROTECT defaults
          # to n, so removing the =y line disables it and still matches savedefconfig.
          sed -i "/^CONFIG_MODULE_SIG_PROTECT=y/d" "$CDEF"
          echo "--- common gki_defconfig MODULE_SIG_PROTECT now: ---"
          grep -n 'MODULE_SIG_PROTECT' "$CDEF" || echo '(symbol absent from common gki_defconfig)'
          if grep -q '^CONFIG_MODULE_SIG_PROTECT=y' "$CDEF"; then
            echo 'ERROR: failed to disable MODULE_SIG_PROTECT in common gki_defconfig'; exit 1
          fi
          # ---- kernel name (uname -r) -- injected via LOCALVERSION env, NOT the defconfig ----
          # WHY NOT the defconfig: CONFIG_LOCALVERSION is ABSENT from this branch's common
          # gki_defconfig, and ADDING it breaks the savedefconfig check_defconfig gate (it compares
          # byte-for-byte in canonical order -- an appended line lands in the wrong spot and fails,
          # which is exactly what killed the previous run). Instead we inject the name with the
          # LOCALVERSION env var, honored by scripts/setlocalversion via
          #   res="${config_localversion}${LOCALVERSION}"  -- no source edit, no gate.
          # It is exported in the Build step and forwarded into the hermetic Bazel sandbox with
          # --action_env=LOCALVERSION.
          #
          # KILL the trailing "-android14-11-...-maybe-dirty": scripts/setlocalversion returns the
          # contents of .scmversion EARLY -- before it prints -$android_release-$kmi_generation and
          # before the git/-dirty logic -- so an EMPTY .scmversion yields an empty scm suffix and
          # uname ends exactly at ...-GAME-OVER-op. (Kleaf's DEFAULT embedded localversion MAY still
          # force -android14-11; the diagnostic step after Build prints the real release so we can
          # add --nokleaf_localversion next iteration if needed. COSMETIC -- must never fail build.)
          # CUSTOM uname (KMI-preserving): overwrite common/scripts/setlocalversion so the
          # GKI kernel (common:kernel_aarch64 -- the Image that actually boots) reports our name.
          # --nokleaf_localversion (in the Build step) makes Kleaf derive the release from this
          # script instead of its own stamp. We MUST keep the "-android14-11" KMI marker: Kleaf
          # runs a KMI/sublevel consistency check vs msm-kernel (which stays -android14-11), and a
          # release WITHOUT the marker fails the build ("KMI or sublevel mismatch" + "not a valid
          # GKI version", and it also breaks the system_dlkm image). So we emit -android14-11-<name>:
          #   uname -r = 6.1.174-android14-11-kurumi-dev-GAME-OVER-op
          # Only common is patched; msm-kernel keeps its native -android14-11-o-maybe-dirty, so both
          # carry KMI android14-11 and the check passes (the 173-vs-174 sublevel diff is tolerated,
          # exactly as in the prior booting builds). NOTE: the name is non-ASCII (Japanese) -- a
          # user-accepted risk that the erofs/image tooling could still reject it.
          : > common/.scmversion || true
          printf '#!/bin/sh\necho "%s"\n' '-android14-11-kurumi-dev-GAME-OVER-op' > common/scripts/setlocalversion
          chmod +x common/scripts/setlocalversion
          echo '--- overwrote common/scripts/setlocalversion (KMI-preserving custom release) ---'
          head -3 common/scripts/setlocalversion
          # ---- Kurumi build stamp: HARD-override (kurumi@dev) + real build time ----
          # Kleaf pins KBUILD_BUILD_USER/HOST=build-user/build-host and TIMESTAMP=epoch-0 (1970)
          # inside its sandbox, overriding job env AND --action_env. So force it in mkcompile_h
          # itself (runs last, inside the compile): an unconditional export beats Kleaf's values,
          # and date is evaluated at compile time. Guarded + non-fatal (never breaks the build).
          set +e
          for mch in common/scripts/mkcompile_h msm-kernel/scripts/mkcompile_h; do
            [ -f "$mch" ] || continue
            grep -q KURUMI_STAMP "$mch" && continue
            _t="$(mktemp)"
            { head -n 1 "$mch"; \
              echo '# KURUMI_STAMP: force build identity/timestamp (Kleaf pins these otherwise)'; \
              echo 'export KBUILD_BUILD_USER=kurumi'; \
              echo 'export KBUILD_BUILD_HOST=dev'; \
              echo 'export KBUILD_BUILD_TIMESTAMP="$(date -u "+%a %b %e %H:%M:%S UTC %Y")"'; \
              tail -n +2 "$mch"; } > "$_t" && cat "$_t" > "$mch"
            echo "kurumi: hard-stamped $mch"
          done
          set -e

          # QCOM has TWO strict config gates:
          #   (1) merge_defconfig_fragments -> "Detected overridden config" if a vendor
          #       fragment DISABLES a base =y/=m symbol. So disables live in the base.
          #   (2) check_merged_defconfig (diffconfig) -> "Defconfig fragment did not apply
          #       as expected" if the resolved .config differs from the merged defconfig
          #       (anything except pure additions). So every requested symbol must STICK.
          #
          # Therefore in the base gki_defconfig:
          #   - PM_DEBUG / THERMAL_STATISTICS / THERMAL_EMULATION: flip y -> not set (they stick).
          #   - PM_ADVANCED_DEBUG: it 'depends on PM_DEBUG'. With PM_DEBUG off it becomes
          #     invisible and vanishes from .config, so we must DELETE its line entirely
          #     (an explicit '# ... is not set' would mismatch and fail gate (2)).
          #
          # NOTE: the OnePlus-base-only USB_ACM / USB_SERIAL / BT_RFCOMM disables were REMOVED.
          #   They existed solely because the OnePlus common lacked __tty_port_tty_hangup; the
          #   AOSP GKI base exports it, so those stock modules build normally and we keep full
          #   ABI/module parity with the device. Only the low-risk debug/thermal-off tweaks stay
          #   (they touch no exported symbol / KMI). PM_ADVANCED_DEBUG depends on PM_DEBUG, so
          #   once PM_DEBUG is off it vanishes from .config -> delete its line (an explicit
          #   '# ... is not set' for a hidden symbol would fail the merged-defconfig gate).
          sed -i \
            -e 's/^CONFIG_PM_DEBUG=y/# CONFIG_PM_DEBUG is not set/' \
            -e '/^CONFIG_PM_ADVANCED_DEBUG=y/d' \
            -e 's/^CONFIG_THERMAL_STATISTICS=y/# CONFIG_THERMAL_STATISTICS is not set/' \
            -e 's/^CONFIG_THERMAL_EMULATION=y/# CONFIG_THERMAL_EMULATION is not set/' \
            -e 's/^CONFIG_MODULE_SIG_PROTECT=y/# CONFIG_MODULE_SIG_PROTECT is not set/' \
            "$DEF"

          # Additive-only tweaks in the vendor fragment (enabling new symbols is allowed).
          # NOTE: BBR/TCP-default was intentionally dropped: GKI ships with
          # CONFIG_TCP_CONG_ADVANCED off, so the congestion choice is hidden and
          # TCP_CONG_BBR/DEFAULT_BBR cannot stick (gate (2) rejects them). BBR would
          # require re-opening the choice, which perturbs many symbols. Not worth it
          # for a balanced-power build; CUBIC default is fine.
          {
            echo ''
            echo '# === custom: balanced power-saving (additive, verified to apply) ==='
            echo 'CONFIG_WQ_POWER_EFFICIENT_DEFAULT=y'
          } >> "$FRAG"
          # NOTE: the kernel NAME (uname -r) is injected via the LOCALVERSION env var in the Build
          #   step (+ empty common/.scmversion to strip the scm/KMI/-dirty suffix) -- NOT via any
          #   defconfig, to stay clear of the savedefconfig gate. Author identity also shows via
          #   KBUILD_BUILD_USER/HOST (kurumi@dev) in /proc/version.

          echo '--- gki_defconfig debug/thermal lines now: ---'
          grep -nE 'PM_DEBUG|PM_ADVANCED_DEBUG|THERMAL_STATISTICS|THERMAL_EMULATION|MODULE_SIG_PROTECT' "$DEF" || true
          # Hard guard: the whole boot fix depends on this flip sticking. If the base
          # gki_defconfig still has it =y, the sed missed it -> fail loudly (do NOT ship a
          # kernel that still rejects stock /system_dlkm GKI modules -> boot-anim hang).
          if grep -q '^CONFIG_MODULE_SIG_PROTECT=y' "$DEF"; then
            echo 'ERROR: MODULE_SIG_PROTECT still =y after sed flip - aborting'; exit 1
          fi
          grep -q '^# CONFIG_MODULE_SIG_PROTECT is not set' "$DEF" \
            || echo 'WARN: MODULE_SIG_PROTECT absent from base gki_defconfig; may be forced elsewhere - verify resolved .config'
          echo '--- vendor fragment tail: ---'; tail -n 8 "$FRAG"

      - name: Build kernel (standalone Kleaf/Bazel)
        working-directory: /mnt/src/kp/kernel_platform
        env:
          # Injected into the kernel release string by setlocalversion; forwarded into the Bazel
          # action sandbox by --action_env=LOCALVERSION below. Leading '-' is required.
          LOCALVERSION: "-kurumi-dev-GAME-OVER-op"
        run: |
          set -e
          # Cap concurrency + RAM budget so the peak (LTO link of vmlinux + parallel
          # module/image actions) stays within RAM+swap and does not OOM-kill the
          # runner. build_with_bazel.py forwards unknown flags verbatim to `bazel
          # build` (argparse parse_known_args), so these reach Bazel directly.
          # KBUILD_BUILD_TIMESTAMP overrides the reproducible-build epoch-0 (1970) default so the
          # real CI time lands in /proc/version. Its value has SPACES and COLONS ('Wed Jul 15
          # 16:35:20 UTC 2026'); build_with_bazel.py re-joins forwarded args into ONE shell string,
          # so passing --action_env=KBUILD_BUILD_TIMESTAMP="..." gets space-split and Bazel mistakes
          # '16:35:20' for a target (': not allowed'). FIX: export the var and use the NAME-ONLY
          # form --action_env=KBUILD_BUILD_TIMESTAMP -- Bazel then reads it from the environment and
          # the value never touches the command line. This is the same pattern that already works
          # for USER/HOST (set at job level, forwarded name-only).
          BUILD_TS="$(date -u '+%a %b %e %H:%M:%S UTC %Y')"
          export KBUILD_BUILD_TIMESTAMP="$BUILD_TS"
          echo "--- stamping build: ts='$BUILD_TS' user='${KBUILD_BUILD_USER:-}' host='${KBUILD_BUILD_HOST:-}' ---"
          ./msm-kernel/build_with_bazel.py -t pineapple gki --skip abl \
            --jobs=2 --local_ram_resources=9830 \
            --nokleaf_localversion \
            --action_env=LOCALVERSION \
            --action_env=KBUILD_BUILD_USER \
            --action_env=KBUILD_BUILD_HOST \
            --action_env=KBUILD_BUILD_TIMESTAMP

      - name: Print kernel release string (diagnostic, non-fatal)
        working-directory: /mnt/src/kp/kernel_platform
        run: |
          set +e
          echo '=== resolved kernel release (uname -r) as built ==='
          rel="$(find out -type f -name kernel.release 2>/dev/null | head -n1)"
          if [ -n "$rel" ]; then
            echo "KERNEL RELEASE: $(cat "$rel")"
          else
            img="$(find out -type f \( -name Image -o -name Image.gz \) 2>/dev/null | head -n1)"
            if [ -n "$img" ]; then
              case "$img" in
                *.gz) banner="$(zcat "$img" 2>/dev/null | strings -a | grep -m1 'Linux version')" ;;
                *)    banner="$(strings -a "$img" | grep -m1 'Linux version')" ;;
              esac
              echo "KERNEL BANNER: ${banner:-<not found>}"
            else
              echo 'WARN: no kernel.release or Image found to read version from'
            fi
          fi
          echo '=== expected: 6.1.174-android14-11-kurumi-dev-GAME-OVER-op ==='
          echo '=== if a trailing -android14-11 appears, tell me; I will add --nokleaf_localversion ==='
          exit 0

      - name: Verify MODULE_SIG_PROTECT is OFF in the built kernel
        working-directory: /mnt/src/kp/kernel_platform
        run: |
          set -e
          # Extract the config baked into the produced Image and PROVE the fix
          # took effect. If the GKI build force-re-enabled MODULE_SIG_PROTECT the
          # boot.img would hang again -> FAIL here instead of shipping it. This
          # turns "flash and find out" into a CI assertion (no brick risk).
          DIST=out/msm-kernel-pineapple-gki/dist
          [ -d "$DIST" ] || DIST="$(dirname "$(find out -type f -name boot.img -path "*dist*" 2>/dev/null | head -1)")"
          IMG=""
          for c in Image Image.gz; do [ -f "$DIST/$c" ] && { IMG="$DIST/$c"; break; }; done
          [ -n "$IMG" ] || IMG="$(find out -type f \( -name Image -o -name Image.gz \) -path "*dist*" 2>/dev/null | head -1)"
          [ -n "$IMG" ] || { echo "ERROR: no kernel Image found to verify"; exit 1; }
          echo "verifying config baked into: $IMG"
          CFG="$(common/scripts/extract-ikconfig "$IMG" 2>/dev/null || true)"
          if [ -z "$CFG" ]; then echo "WARN: extract-ikconfig empty (IKCONFIG missing?) - cannot assert; continuing"; exit 0; fi
          echo "$CFG" | grep -E 'CONFIG_MODULE_SIG(_PROTECT)?=' || true
          if echo "$CFG" | grep -q '^CONFIG_MODULE_SIG_PROTECT=y'; then
            echo "ERROR: built kernel STILL has CONFIG_MODULE_SIG_PROTECT=y - GKI force-enabled it."
            echo "       Do NOT flash this boot.img; switch to flashing a matching system_dlkm."
            exit 1
          fi
          echo "OK: CONFIG_MODULE_SIG_PROTECT is disabled in the built kernel Image."

      - name: Collect artifacts (boot.img + vendor_boot.img)
        working-directory: /mnt/src/kp/kernel_platform
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/out-artifacts"
          DIST=out/msm-kernel-pineapple-gki/dist
          if [ ! -d "$DIST" ]; then
            DIST="$(dirname "$(find out -type f -name 'boot.img' -path '*dist*' 2>/dev/null | head -1)")"
          fi
          echo "dist dir: $DIST"
          got=0
          for f in boot.img vendor_boot.img; do
            src="$DIST/$f"
            [ -f "$src" ] || src="$(find out -type f -name "$f" 2>/dev/null | head -1)"
            if [ -n "$src" ] && [ -f "$src" ]; then
              cp -v "$src" "$GITHUB_WORKSPACE/out-artifacts/"
              got=$((got+1))
            else
              echo "WARNING: $f not found in build output"
            fi
          done
          echo 'artifacts:'; ls -la "$GITHUB_WORKSPACE/out-artifacts/"
          [ "$got" -ge 1 ] || { echo 'ERROR: neither boot.img nor vendor_boot.img was produced'; exit 1; }

      - name: Package Kurumi flashable zip (kernel only)
        working-directory: /mnt/src/kp/kernel_platform
        run: |
          set -e
          # TEST FIRST WITH RAM-BOOT: `fastboot boot boot.img` (from out-artifacts) loads the
          # kernel into RAM WITHOUT writing any partition -- a bad kernel is undone by a simple
          # reboot (hold Power ~10s), so it CANNOT brick /data. Only after the kernel is confirmed
          # stable in RAM should you consider the Kurumi zip below (permanent). The zip replaces
          # ONLY the kernel inside the device's own boot image, preserving the original ramdisk;
          # vbmeta is NOT touched or signed (patch_vbmeta_flag=0).
          DIST=out/msm-kernel-pineapple-gki/dist
          [ -d "$DIST" ] || DIST="$(dirname "$(find out -type f -name 'boot.img' -path '*dist*' 2>/dev/null | head -1)")"
          # locate the raw kernel image (prefer compressed Image.gz, else Image)
          IMG=""
          for cand in Image.gz Image; do
            [ -f "$DIST/$cand" ] && { IMG="$DIST/$cand"; break; }
          done
          [ -n "$IMG" ] || IMG="$(find out -type f \( -name Image.gz -o -name Image \) -path '*dist*' 2>/dev/null | head -1)"
          [ -n "$IMG" ] || IMG="$(find out -type f \( -name Image.gz -o -name Image \) 2>/dev/null | head -1)"
          if [ -z "$IMG" ] || [ ! -f "$IMG" ]; then
            echo 'ERROR: raw kernel Image not found; cannot build Kurumi zip'; exit 1
          fi
          echo "kernel image: $IMG"
          AK="$GITHUB_WORKSPACE/anykernel"
          [ -f "$AK/anykernel.sh" ] || { echo 'ERROR: anykernel/ framework missing from repo'; exit 1; }
          # drop the freshly built kernel in, replacing any stale image
          rm -f "$AK"/Image "$AK"/Image.gz "$AK"/Image-dtb "$AK"/Image.gz-dtb
          cp -v "$IMG" "$AK/$(basename "$IMG")"
          # make sure the flasher binaries stay executable inside the zip
          chmod 0755 "$AK"/tools/* "$AK"/META-INF/com/google/android/update-binary || true
          mkdir -p "$GITHUB_WORKSPACE/out-artifacts"
          ZIP="$GITHUB_WORKSPACE/out-artifacts/Kurumi_kernel_build${GITHUB_RUN_NUMBER}.zip"
          ( cd "$AK" && zip -r9 "$ZIP" . -x '.git*' )
          echo 'Kurumi zip contents:'; unzip -l "$ZIP"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tiro-kernel
          path: out-artifacts/**
          if-no-files-found: warn
          retention-days: 14
